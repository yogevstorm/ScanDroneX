# Joystick teleop configuration for sjtu_drone
# Tested with Xbox / PS4 controller (standard layout)
#
# Axis mapping (check your controller with: ros2 run joy joy_node, then ros2 topic echo /joy)
#   Axis 0  — Left stick  horizontal  (left/right)  → linear.y  (strafe)
#   Axis 1  — Left stick  vertical    (up/down)     → linear.x  (forward/back)
#   Axis 3  — Right stick horizontal  (left/right)  → angular.z (yaw)
#   Axis 4  — Right stick vertical    (up/down)     → linear.z  (altitude)
#
# Button 5 (RB / R1) — hold to enable movement (dead-man switch)
# Button 4 (LB / L1) — hold for turbo mode

teleop_twist_joy_node:
  ros__parameters:
    axis_linear:
      x: 1
      y: 0
      z: 4
    scale_linear:
      x: 2.0
      y: 2.0
      z: 2.0
    scale_linear_turbo:
      x: 4.0
      y: 4.0
      z: 4.0

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 1.5
    scale_angular_turbo:
      yaw: 3.0

    enable_button: 5        # RB / R1 — hold to move
    enable_turbo_button: 4  # LB / L1 — hold for turbo
